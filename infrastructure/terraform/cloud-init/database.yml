#cloud-config
# Predix Database Server Cloud-Init Configuration

# System updates and packages
package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - software-properties-common
  - postgresql-client
  - redis-tools
  - htop
  - vim
  - git
  - fail2ban
  - ufw

# Docker installation
runcmd:
  # Install Docker
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu
  
  # Install Docker Compose
  - curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
  - chmod +x /usr/local/bin/docker-compose
  - ln -s /usr/local/bin/docker-compose /usr/bin/docker-compose
  
  # Configure firewall (more restrictive for database)
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ssh
  - ufw allow from 10.0.0.0/16 to any port 5432
  - ufw allow from 10.0.0.0/16 to any port 6379
  - ufw --force enable
  
  # Configure fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban
  
  # Mount PostgreSQL volume
  - mkdir -p /opt/predix/postgres
  - mount /dev/sdb /opt/predix/postgres
  - echo '/dev/sdb /opt/predix/postgres ext4 defaults 0 2' >> /etc/fstab
  
  # Create database directories
  - mkdir -p /opt/predix/postgres/data
  - mkdir -p /opt/predix/redis/data
  - mkdir -p /opt/predix/backups
  - mkdir -p /opt/predix/logs
  - mkdir -p /opt/predix/scripts
  - chown -R ubuntu:ubuntu /opt/predix
  
  # Create PostgreSQL configuration
  - |
    cat > /opt/predix/postgres/postgresql.conf << EOF
    # PostgreSQL Configuration for Predix
    
    # Connection Settings
    listen_addresses = '*'
    port = 5432
    max_connections = 200
    
    # Memory Settings
    shared_buffers = 256MB
    effective_cache_size = 1GB
    work_mem = 4MB
    maintenance_work_mem = 64MB
    
    # WAL Settings
    wal_level = replica
    max_wal_size = 1GB
    min_wal_size = 80MB
    checkpoint_completion_target = 0.9
    
    # Logging
    log_destination = 'stderr'
    logging_collector = on
    log_directory = '/var/log/postgresql'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_rotation_age = 1d
    log_rotation_size = 100MB
    log_min_duration_statement = 1000
    log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
    
    # Performance
    random_page_cost = 1.1
    effective_io_concurrency = 200
    
    # Autovacuum
    autovacuum = on
    autovacuum_max_workers = 3
    autovacuum_naptime = 1min
    EOF
  
  # Create PostgreSQL pg_hba.conf
  - |
    cat > /opt/predix/postgres/pg_hba.conf << EOF
    # PostgreSQL Client Authentication Configuration
    
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    
    # Local connections
    local   all             all                                     peer
    
    # IPv4 local connections
    host    all             all             127.0.0.1/32            md5
    
    # Internal network connections
    host    all             all             10.0.0.0/16             md5
    
    # Replication connections
    host    replication     all             10.0.0.0/16             md5
    EOF
  
  # Create Redis configuration
  - |
    cat > /opt/predix/redis/redis.conf << EOF
    # Redis Configuration for Predix
    
    # Network
    bind 0.0.0.0
    port 6379
    protected-mode yes
    requirepass ${redis_password}
    
    # General
    daemonize no
    supervised systemd
    pidfile /var/run/redis/redis-server.pid
    loglevel notice
    logfile /var/log/redis/redis-server.log
    
    # Persistence
    save 900 1
    save 300 10
    save 60 10000
    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb
    dir /data
    
    # Append Only File
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    
    # Memory Management
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    
    # Security
    rename-command FLUSHDB ""
    rename-command FLUSHALL ""
    rename-command DEBUG ""
    rename-command CONFIG "CONFIG_b835729c8b"
    EOF
  
  # Create Docker Compose for databases
  - |
    cat > /opt/predix/docker-compose.yml << EOF
    version: '3.8'
    
    services:
      postgres:
        image: postgres:15-alpine
        container_name: predix_postgres
        restart: unless-stopped
        environment:
          POSTGRES_DB: predix_db
          POSTGRES_USER: predix_user
          POSTGRES_PASSWORD: ${postgres_password}
          POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
        volumes:
          - /opt/predix/postgres/data:/var/lib/postgresql/data
          - /opt/predix/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
          - /opt/predix/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
          - /opt/predix/backups:/backups
        ports:
          - "5432:5432"
        networks:
          - predix_db_network
        command: postgres -c config_file=/etc/postgresql/postgresql.conf
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U predix_user -d predix_db"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 60s
        logging:
          driver: "json-file"
          options:
            max-size: "10m"
            max-file: "3"
    
      redis:
        image: redis:7-alpine
        container_name: predix_redis
        restart: unless-stopped
        volumes:
          - /opt/predix/redis/data:/data
          - /opt/predix/redis/redis.conf:/usr/local/etc/redis/redis.conf
        ports:
          - "6379:6379"
        networks:
          - predix_db_network
        command: redis-server /usr/local/etc/redis/redis.conf
        healthcheck:
          test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 30s
        logging:
          driver: "json-file"
          options:
            max-size: "10m"
            max-file: "3"
    
    networks:
      predix_db_network:
        driver: bridge
    EOF
  
  # Create database initialization script
  - |
    cat > /opt/predix/scripts/init-db.sql << EOF
    -- Predix Database Initialization
    
    -- Create extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";
    CREATE EXTENSION IF NOT EXISTS "btree_gin";
    
    -- Create indexes for performance
    -- (These will be created by the application, but we can prepare)
    
    -- Grant permissions
    GRANT ALL PRIVILEGES ON DATABASE predix_db TO predix_user;
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO predix_user;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO predix_user;
    
    -- Create backup user
    CREATE USER backup_user WITH PASSWORD '${postgres_password}_backup';
    GRANT CONNECT ON DATABASE predix_db TO backup_user;
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO backup_user;
    EOF
  
  # Create backup script
  - |
    cat > /opt/predix/scripts/backup-db.sh << 'EOF'
    #!/bin/bash
    # Database Backup Script
    
    BACKUP_DIR="/opt/predix/backups"
    DATE=$(date +%Y%m%d_%H%M%S)
    
    # Create backup directory
    mkdir -p $BACKUP_DIR/$DATE
    
    # PostgreSQL backup
    docker exec predix_postgres pg_dump -U predix_user -d predix_db > $BACKUP_DIR/$DATE/postgres_backup.sql
    docker exec predix_postgres pg_dumpall -U predix_user > $BACKUP_DIR/$DATE/postgres_full_backup.sql
    
    # Redis backup
    docker exec predix_redis redis-cli --rdb - > $BACKUP_DIR/$DATE/redis_backup.rdb
    docker exec predix_redis redis-cli BGSAVE
    
    # Compress backups
    tar -czf $BACKUP_DIR/db_backup_$DATE.tar.gz -C $BACKUP_DIR $DATE
    rm -rf $BACKUP_DIR/$DATE
    
    # Keep only last 30 days of backups
    find $BACKUP_DIR -name "db_backup_*.tar.gz" -mtime +30 -delete
    
    echo "Database backup completed: db_backup_$DATE.tar.gz"
    EOF
  
  - chmod +x /opt/predix/scripts/backup-db.sh
  - chown ubuntu:ubuntu /opt/predix/scripts/backup-db.sh
  
  # Create monitoring script
  - |
    cat > /opt/predix/scripts/monitor-db.sh << 'EOF'
    #!/bin/bash
    # Database Monitoring Script
    
    LOG_FILE="/opt/predix/logs/db-monitor.log"
    
    # Function to log messages
    log_message() {
        echo "$(date '+%Y-%m-%d %H:%M:%S') - $1" >> $LOG_FILE
    }
    
    # Check PostgreSQL
    if ! docker exec predix_postgres pg_isready -U predix_user > /dev/null 2>&1; then
        log_message "ERROR: PostgreSQL is not responding"
        docker restart predix_postgres
    else
        # Check database size
        DB_SIZE=$(docker exec predix_postgres psql -U predix_user -d predix_db -t -c "SELECT pg_size_pretty(pg_database_size('predix_db'));" | xargs)
        log_message "INFO: Database size: $DB_SIZE"
        
        # Check active connections
        ACTIVE_CONN=$(docker exec predix_postgres psql -U predix_user -d predix_db -t -c "SELECT count(*) FROM pg_stat_activity WHERE state = 'active';" | xargs)
        log_message "INFO: Active connections: $ACTIVE_CONN"
    fi
    
    # Check Redis
    if ! docker exec predix_redis redis-cli ping > /dev/null 2>&1; then
        log_message "ERROR: Redis is not responding"
        docker restart predix_redis
    else
        # Check Redis memory usage
        REDIS_MEMORY=$(docker exec predix_redis redis-cli info memory | grep used_memory_human | cut -d: -f2 | tr -d '\r')
        log_message "INFO: Redis memory usage: $REDIS_MEMORY"
    fi
    
    # Check disk space
    DISK_USAGE=$(df /opt/predix | tail -1 | awk '{print $5}' | sed 's/%//')
    if [ $DISK_USAGE -gt 85 ]; then
        log_message "WARNING: Disk usage is at $DISK_USAGE%"
    fi
    
    log_message "Database monitoring completed"
    EOF
  
  - chmod +x /opt/predix/scripts/monitor-db.sh
  - chown ubuntu:ubuntu /opt/predix/scripts/monitor-db.sh
  
  # Create systemd service for databases
  - |
    cat > /etc/systemd/system/predix-db.service << EOF
    [Unit]
    Description=Predix Database Stack
    Requires=docker.service
    After=docker.service
    
    [Service]
    Type=oneshot
    RemainAfterExit=yes
    WorkingDirectory=/opt/predix
    ExecStart=/usr/local/bin/docker-compose up -d
    ExecStop=/usr/local/bin/docker-compose down
    TimeoutStartSec=0
    User=ubuntu
    Group=ubuntu
    
    [Install]
    WantedBy=multi-user.target
    EOF
  
  # Enable database service
  - systemctl daemon-reload
  - systemctl enable predix-db.service
  
  # Setup cron jobs
  - echo "0 2 * * * ubuntu /opt/predix/scripts/backup-db.sh >> /opt/predix/logs/backup.log 2>&1" >> /etc/crontab
  - echo "*/10 * * * * ubuntu /opt/predix/scripts/monitor-db.sh" >> /etc/crontab
  
  # Install Node Exporter for monitoring
  - wget https://github.com/prometheus/node_exporter/releases/latest/download/node_exporter-1.6.1.linux-amd64.tar.gz
  - tar xvfz node_exporter-1.6.1.linux-amd64.tar.gz
  - mv node_exporter-1.6.1.linux-amd64/node_exporter /usr/local/bin/
  - rm -rf node_exporter-1.6.1.linux-amd64*
  
  # Create Node Exporter service
  - |
    cat > /etc/systemd/system/node_exporter.service << EOF
    [Unit]
    Description=Node Exporter
    After=network.target
    
    [Service]
    Type=simple
    ExecStart=/usr/local/bin/node_exporter
    User=ubuntu
    Group=ubuntu
    Restart=always
    RestartSec=5
    
    [Install]
    WantedBy=multi-user.target
    EOF
  
  - systemctl daemon-reload
  - systemctl enable node_exporter
  - systemctl start node_exporter
  
  # Start database services
  - systemctl start predix-db.service
  
  # Configure log rotation
  - |
    cat > /etc/logrotate.d/predix-db << EOF
    /opt/predix/logs/*.log {
        daily
        missingok
        rotate 30
        compress
        delaycompress
        notifempty
        create 644 ubuntu ubuntu
        postrotate
            docker-compose -f /opt/predix/docker-compose.yml restart > /dev/null 2>&1 || true
        endscript
    }
    EOF
  
  # Final system configuration
  - systemctl restart cron
  - echo "Database server setup completed" > /opt/predix/setup-complete.txt

# SSH configuration
ssh_pwauth: false
ssh_authorized_keys: []

# Timezone
timezone: UTC

# Locale
locale: en_US.UTF-8

# Final message
final_message: |
  Predix Database Server is ready!
  
  Services installed:
  - PostgreSQL 15 (port 5432)
  - Redis 7 (port 6379)
  - Node Exporter (monitoring)
  - Automated backups
  - Database monitoring
  
  Database directory: /opt/predix
  Backup directory: /opt/predix/backups
  
  Next steps:
  1. Verify database connectivity
  2. Run application migrations
  3. Configure monitoring alerts
