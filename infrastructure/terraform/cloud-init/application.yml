#cloud-config
# Predix Application Server Cloud-Init Configuration

# System updates and packages
package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - software-properties-common
  - unzip
  - wget
  - htop
  - vim
  - git
  - fail2ban
  - ufw
  - certbot
  - python3-certbot-nginx

# Docker installation
runcmd:
  # Install Docker
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu
  
  # Install Docker Compose
  - curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
  - chmod +x /usr/local/bin/docker-compose
  - ln -s /usr/local/bin/docker-compose /usr/bin/docker-compose
  
  # Install Hetzner CLI
  - wget https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz
  - tar -xzf hcloud-linux-amd64.tar.gz
  - mv hcloud /usr/local/bin/
  - rm hcloud-linux-amd64.tar.gz
  
  # Configure firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ssh
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow from ${db_server_ip}
  - ufw --force enable
  
  # Configure fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban
  
  # Mount application volume
  - mkdir -p /opt/predix
  - mount /dev/sdb /opt/predix
  - echo '/dev/sdb /opt/predix ext4 defaults 0 2' >> /etc/fstab
  
  # Create application directories
  - mkdir -p /opt/predix/app
  - mkdir -p /opt/predix/data
  - mkdir -p /opt/predix/logs
  - mkdir -p /opt/predix/backups
  - mkdir -p /opt/predix/ssl
  - chown -R ubuntu:ubuntu /opt/predix
  
  # Create environment file
  - |
    cat > /opt/predix/.env << EOF
    # Environment
    ENVIRONMENT=${environment}
    DOMAIN=${domain}
    
    # Database
    DATABASE_URL=postgresql://predix_user:${postgres_password}@${db_server_ip}:5432/predix_db
    REDIS_URL=redis://:${redis_password}@${db_server_ip}:6379/0
    
    # Security
    SECRET_KEY=\$(openssl rand -hex 32)
    ACCESS_TOKEN_EXPIRE_MINUTES=30
    
    # SSL
    ACME_EMAIL=${acme_email}
    
    # Monitoring
    PROMETHEUS_RETENTION=30d
    GRAFANA_ADMIN_PASSWORD=\$(openssl rand -base64 32)
    
    # Application
    APP_VERSION=latest
    LOG_LEVEL=INFO
    
    # CORS
    CORS_ORIGINS=https://${domain},https://www.${domain},https://api.${domain}
    EOF
  
  # Set proper permissions
  - chmod 600 /opt/predix/.env
  - chown ubuntu:ubuntu /opt/predix/.env
  
  # Create systemd service for Predix
  - |
    cat > /etc/systemd/system/predix.service << EOF
    [Unit]
    Description=Predix Application Stack
    Requires=docker.service
    After=docker.service
    
    [Service]
    Type=oneshot
    RemainAfterExit=yes
    WorkingDirectory=/opt/predix/app
    ExecStart=/usr/local/bin/docker-compose up -d
    ExecStop=/usr/local/bin/docker-compose down
    TimeoutStartSec=0
    User=ubuntu
    Group=ubuntu
    
    [Install]
    WantedBy=multi-user.target
    EOF
  
  # Enable Predix service
  - systemctl daemon-reload
  - systemctl enable predix.service
  
  # Configure log rotation
  - |
    cat > /etc/logrotate.d/predix << EOF
    /opt/predix/logs/*.log {
        daily
        missingok
        rotate 30
        compress
        delaycompress
        notifempty
        create 644 ubuntu ubuntu
        postrotate
            docker-compose -f /opt/predix/app/docker-compose.yml restart > /dev/null 2>&1 || true
        endscript
    }
    EOF
  
  # Setup monitoring agent
  - |
    cat > /opt/predix/node-exporter.service << EOF
    [Unit]
    Description=Node Exporter
    After=network.target
    
    [Service]
    Type=simple
    ExecStart=/usr/local/bin/node_exporter
    User=ubuntu
    Group=ubuntu
    Restart=always
    RestartSec=5
    
    [Install]
    WantedBy=multi-user.target
    EOF
  
  # Install Node Exporter
  - wget https://github.com/prometheus/node_exporter/releases/latest/download/node_exporter-1.6.1.linux-amd64.tar.gz
  - tar xvfz node_exporter-1.6.1.linux-amd64.tar.gz
  - mv node_exporter-1.6.1.linux-amd64/node_exporter /usr/local/bin/
  - rm -rf node_exporter-1.6.1.linux-amd64*
  - cp /opt/predix/node-exporter.service /etc/systemd/system/
  - systemctl daemon-reload
  - systemctl enable node_exporter
  - systemctl start node_exporter
  
  # Create backup script
  - |
    cat > /opt/predix/backup.sh << 'EOF'
    #!/bin/bash
    # Predix Backup Script
    
    BACKUP_DIR="/opt/predix/backups"
    DATE=$(date +%Y%m%d_%H%M%S)
    
    # Create backup directory
    mkdir -p $BACKUP_DIR/$DATE
    
    # Backup application data
    docker-compose -f /opt/predix/app/docker-compose.yml exec -T postgres pg_dump -U predix_user predix_db > $BACKUP_DIR/$DATE/postgres_backup.sql
    docker-compose -f /opt/predix/app/docker-compose.yml exec -T redis redis-cli --rdb - > $BACKUP_DIR/$DATE/redis_backup.rdb
    
    # Backup application files
    tar -czf $BACKUP_DIR/$DATE/app_backup.tar.gz -C /opt/predix app
    
    # Compress backup
    tar -czf $BACKUP_DIR/predix_backup_$DATE.tar.gz -C $BACKUP_DIR $DATE
    rm -rf $BACKUP_DIR/$DATE
    
    # Keep only last 7 days of backups
    find $BACKUP_DIR -name "predix_backup_*.tar.gz" -mtime +7 -delete
    
    echo "Backup completed: predix_backup_$DATE.tar.gz"
    EOF
  
  - chmod +x /opt/predix/backup.sh
  - chown ubuntu:ubuntu /opt/predix/backup.sh
  
  # Setup cron for backups
  - echo "0 2 * * * ubuntu /opt/predix/backup.sh >> /opt/predix/logs/backup.log 2>&1" >> /etc/crontab
  
  # Create health check script
  - |
    cat > /opt/predix/health-check.sh << 'EOF'
    #!/bin/bash
    # Predix Health Check Script
    
    LOG_FILE="/opt/predix/logs/health-check.log"
    
    # Function to log messages
    log_message() {
        echo "$(date '+%Y-%m-%d %H:%M:%S') - $1" >> $LOG_FILE
    }
    
    # Check Docker services
    if ! docker-compose -f /opt/predix/app/docker-compose.yml ps | grep -q "Up"; then
        log_message "ERROR: Some Docker services are down"
        docker-compose -f /opt/predix/app/docker-compose.yml up -d
    fi
    
    # Check application health
    if ! curl -f http://localhost/health > /dev/null 2>&1; then
        log_message "ERROR: Application health check failed"
    fi
    
    # Check disk space
    DISK_USAGE=$(df /opt/predix | tail -1 | awk '{print $5}' | sed 's/%//')
    if [ $DISK_USAGE -gt 80 ]; then
        log_message "WARNING: Disk usage is at $DISK_USAGE%"
    fi
    
    log_message "Health check completed"
    EOF
  
  - chmod +x /opt/predix/health-check.sh
  - chown ubuntu:ubuntu /opt/predix/health-check.sh
  
  # Setup cron for health checks
  - echo "*/5 * * * * ubuntu /opt/predix/health-check.sh" >> /etc/crontab
  
  # Final system configuration
  - systemctl restart cron
  - echo "Application server setup completed" > /opt/predix/setup-complete.txt

# SSH configuration
ssh_pwauth: false
ssh_authorized_keys: []

# Timezone
timezone: UTC

# Locale
locale: en_US.UTF-8

# Final message
final_message: |
  Predix Application Server is ready!
  
  Services installed:
  - Docker & Docker Compose
  - Fail2ban & UFW Firewall
  - Node Exporter (monitoring)
  - Automated backups
  - Health monitoring
  
  Application directory: /opt/predix
  Environment file: /opt/predix/.env
  
  Next steps:
  1. Deploy application code
  2. Configure SSL certificates
  3. Setup monitoring dashboards
