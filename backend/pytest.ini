# Pytest Configuration
# Backend Testing Configuration

[pytest]
# Test Discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test Paths
testpaths = tests

# Output
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    -ra

# Coverage Configuration
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*
    */.egg-info/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    # Standard pragma
    pragma: no cover
    
    # Debug code
    def __repr__
    if self\.debug
    
    # Abstract methods
    raise AssertionError
    raise NotImplementedError
    
    # Type checking
    if TYPE_CHECKING:
    if typing.TYPE_CHECKING:
    
    # Main blocks
    if __name__ == .__main__.:

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    auth: Authentication tests
    ai: AI system tests
    payments: Payment tests
    admin: Admin tests
    security: Security tests

# Timeout
timeout = 300

# Async
asyncio_mode = auto
